workflows:
  android-workflow:
    name: DeepResearch Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Debug APK bauen
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
